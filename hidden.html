<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Exercise 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <h2 class="text-xl font-semibold text-gray-700 mb-4">Secret Message</h2>

    <p id="message" class="text-green-600 text-lg hidden">
      🎉 You revealed the secret message!
    </p>

    <script>
      const message = document.getElementById("message");
      message.classList.remove("hidden");
    </script>
  </body>
</html>
