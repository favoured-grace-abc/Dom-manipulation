<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Exercise 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <div
      id="colorBox"
      class="w-40 h-40 rounded-2xl bg-gray-300"
    ></div>

    <script>
      const colorBox = document.getElementById("colorBox");
      colorBox.classList.remove("bg-gray-300");
      colorBox.classList.add("bg-blue-500");
    </script>

  </body>
</html>
