<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Exercise 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <div id="card" class="bg-white rounded-2xl shadow p-6 max-w-sm">
      <h2 class="text-lg font-bold text-gray-800 mb-2">My Card</h2>
    </div>

    <script>
      const card = document.getElementById("card");
      const newparagraph = document.createElement("p");
      newparagraph.textContent = "This paragraph was added by JavaScript.";
      newparagraph.classList.add("text-gray-500", "text-sm", "mt-2");
        card.appendChild(newparagraph);
       
    </script>

  </body>
</html>
